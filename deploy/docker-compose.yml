version: "3.8"

services:
  mock-license:
    image: node:22-alpine
    container_name: infisical-mock-license
    restart: unless-stopped
    command: node /app/mock-license-server.mjs
    volumes:
      - ./mock-license-server.mjs:/app/mock-license-server.mjs:ro
    networks:
      - infisical
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  backend:
    image: infisical/infisical:latest
    container_name: infisical
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mock-license:
        condition: service_healthy
    env_file: .env
    ports:
      - "80:8080"
    environment:
      - NODE_ENV=production
      # --- License settings (這裡的值優先於 .env，不可更動) ---
      # 使用 on-prem online key 格式（非 infisical_lk_ 開頭 → LicenseType.Online）
      - LICENSE_KEY=MOCK-LICENSE-KEY
      # 所有 license HTTP 請求都導向 mock server，永不接觸官方
      - LICENSE_SERVER_URL=http://mock-license:3001
      # 以下三個明確清空，防止 .env 殘留值觸發 Cloud / V2 路徑
      - LICENSE_SERVER_KEY=
      - LICENSE_SERVER_V2_SERVICE_KEY=
      - LICENSE_SERVER_V2_URL=
      # V2 mode 鎖定 off，licenseClient backend = null（永不建立 v2 連線）
      - LICENSE_SERVER_V2_MODE=off
    extra_hosts:
      # 把官方 license server 指向 127.0.0.2（blackhole），雙重保險
      - "portal.infisical.com:127.0.0.2"
      - "license.infisical.com:127.0.0.2"
    networks:
      - infisical

  redis:
    image: redis:7-alpine
    container_name: infisical-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - infisical
    volumes:
      - redis_data:/data

  db:
    image: postgres:16-alpine
    container_name: infisical-db
    restart: unless-stopped
    env_file: .env
    networks:
      - infisical
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: "pg_isready --username=${POSTGRES_USER} && psql --username=${POSTGRES_USER} --list"
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  pg_data:
  redis_data:

networks:
  infisical:
