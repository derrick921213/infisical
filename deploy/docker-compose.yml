version: "3.8"

services:
  mock-license:
    image: node:22-alpine
    container_name: infisical-mock-license
    restart: unless-stopped
    command: node /app/mock-license-server.mjs
    volumes:
      - ./mock-license-server.mjs:/app/mock-license-server.mjs:ro
    networks:
      - infisical
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  backend:
    image: infisical/infisical:latest
    container_name: infisical
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mock-license:
        condition: service_healthy
    env_file: .env
    ports:
      - "80:8080"
    environment:
      - NODE_ENV=production
      - LICENSE_KEY=MOCK-LICENSE-KEY
      - LICENSE_SERVER_URL=http://mock-license:3001
    networks:
      - infisical

  redis:
    image: redis:7-alpine
    container_name: infisical-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - infisical
    volumes:
      - redis_data:/data

  db:
    image: postgres:16-alpine
    container_name: infisical-db
    restart: unless-stopped
    env_file: .env
    networks:
      - infisical
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: "pg_isready --username=${POSTGRES_USER} && psql --username=${POSTGRES_USER} --list"
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  pg_data:
  redis_data:

networks:
  infisical:
